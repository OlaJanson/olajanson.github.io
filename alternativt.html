<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Attention Exchange Agreement</title>
    <style>
        /* Import fonts */
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=VT323&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Top Left Title */
        .header-title {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            text-align: left;
            max-width: 300px;
            line-height: 1.2;
            z-index: 10;
        }

        /* Main Container for the illustration */
        .illustration-container {
            position: relative;
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Dithering Image - moved 200px to the left */
        .dithering-ola {
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            image-rendering: pixelated;
            filter: grayscale(100%) contrast(150%);
            transform: translateX(-200px);
        }

        /* The Thought Bubble - moved 50px to the right */
        .thought-bubble {
            position: absolute;
            top: 10%;
            right: -50px;
            width: 200px;
            height: 200px;
            border: 3px solid var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The Tail of the bubble pointing to the head */
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: -35px;
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 35px solid var(--text-color);
        }

        /* Inner white triangle to mask the border for the tail */
        .thought-bubble::before {
            content: '';
            position: absolute;
            bottom: -17px;
            left: -26px;
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 28px solid var(--bg-color);
            z-index: 2;
        }

        /* Retro Text inside bubble */
        .retro-text {
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 1px;
            animation: flicker 4s infinite;
        }

        /* Subtle flicker animation for retro feel */
        @keyframes flicker {
            0% { opacity: 0.9; }
            5% { opacity: 1; }
            10% { opacity: 0.8; }
            15% { opacity: 1; }
            50% { opacity: 1; }
            55% { opacity: 0.95; }
            60% { opacity: 1; }
            100% { opacity: 1; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .header-title {
                top: 20px;
                left: 20px;
                font-size: 1rem;
            }
            .illustration-container {
                width: 90%;
                height: auto;
                flex-direction: column;
            }
            .dithering-ola {
                transform: translateX(0);
            }
            .thought-bubble {
                position: relative;
                top: auto;
                right: auto;
                margin-top: 20px;
                width: 100%;
                height: auto;
                aspect-ratio: 1/1;
            }
            .thought-bubble::after, .thought-bubble::before {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Top Left Title -->
    <div class="header-title">
        The attention<br>exchange<br>agreement
    </div>

    <!-- Main Illustration Area -->
    <div class="illustration-container">
        <!-- Using the provided dithering image -->
        <img src="https://olajanson.se/dithering-ola.png" alt="Dithering Ola" class="dithering-ola">
        
        <!-- Thought Bubble -->
        <div class="thought-bubble">
            <div class="retro-text">
                Please<br>interupt me...
            </div>
        </div>
    </div>

</body>
</html>
