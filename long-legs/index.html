<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Render</title>
    <style>
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #0a0a1a;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        class Character {
            constructor() {
                // Character center x, can be changed to move character
                this.x = canvas.width / 2;

                this.head = { x: -11, y: 184, width: 22, height: 22, color: '#7af' };
                this.leftEye = { x: -7, y: 191, width: 3, height: 3, color: '#012' };
                this.rightEye = { x: 2, y: 191, width: 3, height: 3, color: '#012' };
                this.torso = { x: -9, y: 206, width: 18, height: 14, color: '#7af' };
                this.leftArm = { x: -13, y: 207, width: 4, height: 14, color: '#5cf' };
                this.rightArm = { x: 9, y: 207, width: 4, height: 14, color: '#5cf' };
                this.leftStilt = { hipX: -5, hipY: 220, angle: 0, length: 200, width: 4, color: '#5cf' };
                this.rightStilt = { hipX: 9, hipY: 220, angle: 0, length: 200, width: 4, color: '#5cf' };
                this.leftFoot = { width: 10, height: 5, color: '#aef' };
                this.rightFoot = { width: 10, height: 5, color: '#aef' };
            }

            draw() {
                // Ground spans full canvas — draw BEFORE translate
                ctx.fillStyle = '#334';
                ctx.fillRect(0, 420, canvas.width, canvas.height - 420);

                // All character parts drawn relative to this.x
                ctx.save();
                ctx.translate(this.x, 0);

                ctx.fillStyle = this.head.color;
                ctx.fillRect(this.head.x, this.head.y, this.head.width, this.head.height);

                ctx.fillStyle = this.leftEye.color;
                ctx.fillRect(this.leftEye.x, this.leftEye.y, this.leftEye.width, this.leftEye.height);
                ctx.fillStyle = this.rightEye.color;
                ctx.fillRect(this.rightEye.x, this.rightEye.y, this.rightEye.width, this.rightEye.height);

                ctx.fillStyle = this.torso.color;
                ctx.fillRect(this.torso.x, this.torso.y, this.torso.width, this.torso.height);

                ctx.fillStyle = this.leftArm.color;
                ctx.fillRect(this.leftArm.x, this.leftArm.y, this.leftArm.width, this.leftArm.height);
                ctx.fillStyle = this.rightArm.color;
                ctx.fillRect(this.rightArm.x, this.rightArm.y, this.rightArm.width, this.rightArm.height);

                ctx.save();
                ctx.translate(this.leftStilt.hipX, this.leftStilt.hipY);
                ctx.rotate(this.leftStilt.angle);
                ctx.fillStyle = this.leftStilt.color;
                ctx.fillRect(-2, 0, this.leftStilt.width, this.leftStilt.length);
                ctx.restore();

                ctx.save();
                ctx.translate(this.rightStilt.hipX, this.rightStilt.hipY);
                ctx.rotate(this.rightStilt.angle);
                ctx.fillStyle = this.rightStilt.color;
                ctx.fillRect(-2, 0, this.rightStilt.width, this.rightStilt.length);
                ctx.restore();

                const lFootX = this.leftStilt.hipX + Math.sin(this.leftStilt.angle) * this.leftStilt.length;
                const lFootY = this.leftStilt.hipY + Math.cos(this.leftStilt.angle) * this.leftStilt.length;
                ctx.fillStyle = this.leftFoot.color;
                ctx.fillRect(lFootX - 5, lFootY - 2, this.leftFoot.width, this.leftFoot.height);

                const rFootX = this.rightStilt.hipX + Math.sin(this.rightStilt.angle) * this.rightStilt.length;
                const rFootY = this.rightStilt.hipY + Math.cos(this.rightStilt.angle) * this.rightStilt.length;
                ctx.fillStyle = this.rightFoot.color;
                ctx.fillRect(rFootX - 5, rFootY - 2, this.rightFoot.width, this.rightFoot.height);

                ctx.restore();
            }
        }

        const character = new Character();

        const STEP = character.leftStilt.length * 0.6;
        const STEP_FRAMES = 30;

        let stepState = {
            active: false,
            progress: 0,
            dir: 0,
            activeFoot: 'left'
        };

        document.addEventListener('keydown', function(e) {
            if (stepState.active) return;
            if (e.key === 'ArrowRight') {
                stepState.active = true;
                stepState.progress = 0;
                stepState.dir = 1;
            }
            if (e.key === 'ArrowLeft') {
                stepState.active = true;
                stepState.progress = 0;
                stepState.dir = -1;
            }
        });

        function updateStep() {
            if (!stepState.active) return;

            stepState.progress++;
            const t = stepState.progress / STEP_FRAMES;

            const stilt = stepState.activeFoot === 'left' ? character.leftStilt : character.rightStilt;

            stilt.angle = stepState.dir * 0.35 * Math.sin(t * Math.PI);
            stilt.length = 200 * (1 - 0.12 * Math.sin(t * Math.PI));

            character.x += stepState.dir * STEP / STEP_FRAMES;

            if (stepState.progress >= STEP_FRAMES) {
                stepState.active = false;
                stepState.activeFoot = stepState.activeFoot === 'left' ? 'right' : 'left';
                character.leftStilt.angle = 0;
                character.rightStilt.angle = 0;
                character.leftStilt.length = 200;
                character.rightStilt.length = 200;
            }
        }

        function gameLoop() {
            updateStep();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            character.draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
