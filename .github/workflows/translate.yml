name: Auto-translate SV → EN

on:
  push:
    branches: [v5]
    paths:
      - 'content/**'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # för att kunna dispatcha deploy.yml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full historik — translate.py jämför git-tidsstämplar .md vs .en.md

      - name: Translate changed Swedish articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/translate.py

      - name: Commit translations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "garden-bot"
          git config user.email "garden-bot@users.noreply.github.com"
          git add content/
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "auto: translate updated articles to English [skip translate]"
          git push
          gh workflow run deploy.yml --ref v5   # bot-push triggar inte deploy (GITHUB_TOKEN) → dispatcha den så EN går live nu
