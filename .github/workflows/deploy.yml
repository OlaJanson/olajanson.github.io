name: Build and deploy Quartz to GitHub Pages

# AVSTÄNGD: olajanson.se deployas nu från v5-grenen (se v5/.github/workflows/deploy.yml).
# main och v5 delade samma GitHub Pages och konkurrerade — v5 är numera enda källan.
# Endast manuell körning kvar för nödfall.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - run: npm ci
      - run: npx quartz plugin install
      - run: npx quartz build
      - name: Copy static HTML files to public
        run: |
          python3 generate_tags.py
          rm -f public/index.en.html
          rm -rf public/index.en
          # Startsidan: injicera brödtext (intro) från index.md in i index2.html-heron.
          # Rubrik, bild och kort förblir låsta i index2.html — bara .intro-text uppdateras.
          python3 build_index.py
          rm -f public/premiss.html public/anthony.html public/avatar.html public/businesschmodels.html public/gastbok.html public/jag.html public/treehouse.html public/varfor-digital-garden.html
          rm -rf public/premiss public/anthony public/avatar public/businesschmodels public/gastbok public/jag public/treehouse public/varfor-digital-garden
          cp content/premiss.html public/premiss.html
          cp content/anthony.html public/anthony.html
          cp content/avatar.html public/avatar.html
          cp content/businesschmodels.html public/businesschmodels.html
          cp content/gastbok.html public/gastbok.html
          cp content/jag.html public/jag.html
          cp content/treehouse.html public/treehouse.html
          cp content/varfor-digital-garden.html public/varfor-digital-garden.html
          rm -f public/premiss.en.html public/anthony.en.html public/avatar.en.html public/businesschmodels.en.html public/gastbok.en.html public/jag.en.html public/treehouse.en.html public/varfor-digital-garden.en.html
          rm -rf public/premiss.en public/anthony.en public/avatar.en public/businesschmodels.en public/gastbok.en public/jag.en public/treehouse.en public/varfor-digital-garden.en
          cp content/premiss.en.html public/premiss.en.html
          cp content/anthony.en.html public/anthony.en.html
          cp content/avatar.en.html public/avatar.en.html
          cp content/businesschmodels.en.html public/businesschmodels.en.html
          cp content/gastbok.en.html public/gastbok.en.html
          cp content/jag.en.html public/jag.en.html
          cp content/treehouse.en.html public/treehouse.en.html
          cp content/varfor-digital-garden.en.html public/varfor-digital-garden.en.html
          mkdir -p public/fonts
          cp content/fonts/* public/fonts/
          cp "content/there is no picture.png" "public/there is no picture.png"
          rm -rf public/tags
          mkdir -p public/tags
          cp content/tags/*.html public/tags/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
