name: Build and deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - v5
  workflow_dispatch:   # tillåter translate.yml att trigga deploy efter auto-översättning

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - run: npm ci
      - run: npx quartz plugin install
      - run: npx quartz build
      - name: Bygg hero-startsida + assets
        run: |
          mkdir -p public/fonts
          cp content/fonts/* public/fonts/
          cp content/factotal.jpeg public/factotal.jpeg
          # Startsidan: injicera brödtext från index.md i index2.html-heron.
          # Rubrik, bild och kort förblir låsta i index2.html.
          python3 build_index.py
          # Ta bort Quartz extensionslösa index.en (Pages octet-streamar den → download).
          # Pages clean-URL:ar då /index.en → index.en.html (hero-versionen) som text/html.
          rm -f public/index.en
          # Cache-busting: index.css?v=<hash> + skriv om bara-index.en-länkar → .html
          python3 cachebust.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
